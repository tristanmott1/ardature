<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caradhras Pass Icon Review</title>
    <style>
      body {
        background: #efe9d9;
        color: #1f1f1f;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 20px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        max-width: 900px;
      }

      .icon-card {
        align-items: center;
        background: rgba(255, 255, 255, 0.55);
        border: 2px solid #1f1f1f;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
      }

      img {
        display: block;
        height: 96px;
        width: 96px;
      }

      span {
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Caradhras Pass Icon Review</h1>
    <main class="grid">
      <div class="icon-card"><img src="pass-01.svg" alt="Clear pass icon"><span>State 1</span></div>
      <div class="icon-card"><img src="pass-02.svg" alt="Mostly clear pass icon"><span>State 2</span></div>
      <div class="icon-card"><img src="pass-03.svg" alt="Partly cloudy pass icon"><span>State 3</span></div>
      <div class="icon-card"><img src="pass-04.svg" alt="Windy pass icon"><span>State 4</span></div>
      <div class="icon-card"><img src="pass-05.svg" alt="Snowy passable icon"><span>State 5</span></div>
      <div class="icon-card"><img src="pass-06.svg" alt="Blocked snowy pass icon"><span>State 6</span></div>
      <div class="icon-card"><img src="pass-07.svg" alt="Heavy snow pass icon"><span>State 7</span></div>
      <div class="icon-card"><img src="pass-08.svg" alt="Blizzard pass icon"><span>State 8</span></div>
      <div class="icon-card"><img src="pass-09.svg" alt="Whiteout pass icon"><span>State 9</span></div>
      <div class="icon-card"><img src="pass-10.svg" alt="Severe storm pass icon"><span>State 10</span></div>
    </main>
  </body>
</html>
